<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>paraujoIab | Portafolio</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', sans-serif;
}

body {
  background: radial-gradient(circle at top, #0f172a, #020617);
  color: white;
}

/* NAV */
header {
  position: fixed;
  width: 100%;
  padding: 20px;
  display: flex;
  justify-content: space-between;
  backdrop-filter: blur(10px);
  background: rgba(0,0,0,0.4);
  z-index: 1000;
}

header h2 {
  color: #38bdf8;
}

header a {
  color: white;
  text-decoration: none;
  margin: 0 10px;
  transition: 0.3s;
}

header a:hover {
  color: #38bdf8;
}

/* HERO */
.hero {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  text-align: center;
}

.hero h1 {
  font-size: 3.5rem;
}

.glow {
  color: #38bdf8;
  text-shadow: 0 0 25px #38bdf8;
}

.hero p {
  opacity: 0.7;
  max-width: 600px;
}

.btn {
  margin-top: 20px;
  padding: 12px 25px;
  border-radius: 10px;
  background: #38bdf8;
  color: black;
  text-decoration: none;
  display: inline-block;
  cursor: pointer;
  transition: 0.3s;
}

.btn:hover {
  transform: scale(1.1);
  box-shadow: 0 0 25px #38bdf8;
}

/* SECCIONES */
.section {
  padding: 80px 20px;
}

/* INFO */
.info {
  max-width: 900px;
  margin: auto;
  text-align: center;
  padding: 60px 20px;
}

.info h1 {
  font-size: 2rem;
  margin-bottom: 15px;
}

.info p {
  font-size: 1rem;
  line-height: 1.6;
  opacity: 0.85;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
  gap: 25px;
  max-width: 1200px;
  margin: auto;
}

.card {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(15px);
  border-radius: 20px;
  overflow: hidden;
  transition: 0.4s;
  cursor: pointer;
}

.card img {
  width: 100%;
}

.card:hover {
  transform: translateY(-15px) scale(1.03);
  box-shadow: 0 0 40px rgba(56,189,248,0.6);
}

.card h3 {
  padding: 15px;
}

/* TAG (NUEVO) */
.tag {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  margin: 0 15px 15px;
  padding: 6px 14px;
  border-radius: 20px;
  border: 1px solid orange;
  color: orange;
  font-size: 0.8rem;
  font-weight: bold;
  width: fit-content;
}

.dot {
  width: 8px;
  height: 8px;
  background: #22c55e;
  border-radius: 50%;
}

/* MODAL */
.modal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.7);
  display: flex;
  justify-content: center;
  align-items: center;
  visibility: hidden;
  opacity: 0;
  transition: 0.3s;
  z-index: 2000;
}

.modal.active {
  visibility: visible;
  opacity: 1;
}

.modal-content {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(20px);
  padding: 30px;
  border-radius: 20px;
  max-width: 400px;
  text-align: center;
  animation: pop 0.3s ease;
}

@keyframes pop {
  from { transform: scale(0.7); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}

.close {
  margin-top: 15px;
  padding: 8px 15px;
  background: #38bdf8;
  color: black;
  border-radius: 10px;
  cursor: pointer;
}

/* CONTACTO */
.contact {
  max-width: 600px;
  margin: auto;
  background: rgba(255,255,255,0.05);
  padding: 30px;
  border-radius: 20px;
  backdrop-filter: blur(15px);
  text-align: center;
}

.contact p {
  margin: 10px 0;
}

/* FOOTER */
footer {
  text-align: center;
  padding: 30px;
  opacity: 0.6;
}

/* ANIMACIONES */
.fade-in {
  opacity: 0;
  transform: translateY(40px);
  transition: all 0.8s ease;
}

.fade-in.visible {
  opacity: 1;
  transform: translateY(0);
}

html {
  scroll-behavior: smooth;
}
</style>
</head>

<body>

<header>
  <h2>paraujoIab</h2>
  <nav>
    <a href="#inicio">Inicio</a>
    <a href="#conocimientos">Conocimientos</a>
    <a href="#caracteristicas">Características</a>
    <a href="#opiniones">Opiniones</a>
    <a href="#experiencia">Experiencia</a>
    <a href="#contacto">Contacto</a>
  </nav>
</header>

<section id="inicio" class="hero fade-in">
  <h1>Soy <span class="glow">paraujoIab</span></h1>
  <p>
    Manager, organizador de eventos y organizador de staff en servidores de Minecraft.
  </p>
  <a href="#experiencia" class="btn">Ver experiencia</a>
</section>

<section id="experiencia" class="section fade-in">
  <h2 class="glow" style="text-align:center;margin-bottom:40px;">🔥 Experiencia (11 servidores)</h2>

  <div class="grid">
    <div class="card" onclick="openModal('EskMC Network')">
      <img src="img/esk-mc.png">
      <h3>EskMC Network</h3>
      <div class="tag"><span class="dot"></span> TECHNICAL</div>
    </div>
  </div>
</section>

</body>
</html>
