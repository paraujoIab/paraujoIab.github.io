<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>paraujoIab | Portafolio</title>

<style>
/* --- ESTILOS BASE --- */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

body {
  background: radial-gradient(circle at top, #0f172a, #020617);
  color: white;
  margin-top: 80px;
  overflow-x: hidden;
}

header {
  position: fixed;
  top: 0;
  width: 100%;
  padding: 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  backdrop-filter: blur(10px);
  background: rgba(2, 6, 23, 0.8);
  z-index: 1000;
}

header h2 { color: #38bdf8; }
header a {
  color: white;
  text-decoration: none;
  margin: 0 15px;
  transition: 0.3s;
}

/* --- SECCIÓN DE EXPERIENCIA (GRID) --- */
.section { padding: 80px 20px; max-width: 1200px; margin: auto; }

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 30px;
  margin-top: 40px;
}

.card {
  background: rgba(255,255,255,0.03);
  backdrop-filter: blur(15px);
  border-radius: 24px;
  overflow: hidden;
  transition: 0.4s ease;
  cursor: pointer;
  display: flex;
  flex-direction: column; /* Alineación vertical */
  border: 1px solid rgba(255,255,255,0.1);
  height: 100%; /* Para que todas midan lo mismo */
}

/* AJUSTE PARA QUE EL LOGO SE VEA ENTERO */
.card img { 
  width: 100%; 
  height: 180px; /* Altura fija para el logo */
  object-fit: contain; /* "Contain" asegura que el logo no se corte */
  padding: 20px; /* Espacio para que el logo no toque los bordes */
  background: rgba(0, 0, 0, 0.2);
  transition: 0.4s;
}

.card:hover img {
  transform: scale(1.1);
  filter: drop-shadow(0 0 10px #38bdf8);
}

.card-info {
  padding: 20px;
  flex-grow: 1; /* Empuja lo de abajo hacia el final */
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  align-items: center;
  text-align: center;
}

.card h3 {
  font-size: 1.2rem;
  margin-bottom: 15px;
  color: #f1f5f9;
}

/* BOTONES (BADGES) MÁS ABAJO */
.badge-container {
  margin-top: auto; /* Empuja el botón al fondo de la card */
  padding-top: 10px;
}

.badge {
  display: inline-block;
  padding: 8px 20px;
  border-radius: 999px;
  background: rgba(249,115,22,0.15);
  border: 1px solid rgba(249,115,22,0.5);
  color: #f97316;
  font-size: 0.85rem;
  font-weight: bold;
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-10px);
  box-shadow: 0 15px 35px rgba(56,189,248,0.2);
  border-color: #38bdf8;
}

.card:hover .badge {
  background: #f97316;
  color: #000;
  box-shadow: 0 0 15px #f97316;
}

/* MODAL & OTROS */
.glow { color: #38bdf8; text-shadow: 0 0 15px rgba(56,189,248,0.5); }
.fade-in { opacity: 0; transform: translateY(30px); transition: 0.8s ease-out; }
.fade-in.visible { opacity: 1; transform: translateY(0); }

#modal {
  position: fixed;
  top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.85);
  display: flex; justify-content: center; align-items: center;
  visibility: hidden; opacity: 0; transition: 0.3s; z-index: 2000;
}
#modal.active { visibility: visible; opacity: 1; }
.modal-content {
  background: #0f172a; padding: 40px; border-radius: 20px;
  border: 1px solid #38bdf8; text-align: center;
}
</style>
</head>

<body>

<header>
  <h2>paraujoIab</h2>
  <nav>
    <a href="#experiencia">Experiencia</a>
    <a href="#contacto">Contacto</a>
  </nav>
</header>

<section id="experiencia" class="section fade-in">
  <h2 class="glow" style="text-align:center; font-size: 2.5rem; margin-bottom: 50px;">🔥 Mi Trayectoria</h2>
  
  <div class="grid">
    <div class="card" onclick="openModal('MineRush Network')">
      <img src="mine-rush.png" alt="MineRush Logo">
      <div class="card-info">
        <h3>MineRush Network</h3>
        <div class="badge-container">
          <span class="badge">🟢 Configurator</span>
        </div>
      </div>
    </div>

    <div class="card" onclick="openModal('MineChaos Network')">
      <img src="mine-chaos.png" alt="MineChaos Logo">
      <div class="card-info">
        <h3>MineChaos Network</h3>
        <div class="badge-container">
          <span class="badge">🟢 Administrator</span>
        </div>
      </div>
    </div>

    <div class="card" onclick="openModal('MineGlow Network')">
      <img src="mine-glow.png">
      <div class="card-info">
        <h3>MineGlow Network</h3>
        <div class="badge-container"><span class="badge">🟢 Developer</span></div>
      </div>
    </div>

    <div class="card" onclick="openModal('EgoCraft Network')">
      <img src="ego-craft.png">
      <div class="card-info">
        <h3>EgoCraft Network</h3>
        <div class="badge-container"><span class="badge">🟢 Owner</span></div>
      </div>
    </div>

    </div>
</section>

<div id="modal" class="modal">
  <div class="modal-content">
    <h2 id="modal-title" class="glow"></h2>
    <p style="margin-top: 15px; opacity: 0.8;">Detalles técnicos y gestión de comunidad realizados.</p>
    <button onclick="closeModal()" style="margin-top: 25px; padding: 10px 25px; background: #38bdf8; border: none; border-radius: 8px; cursor: pointer; font-weight: bold;">Cerrar</button>
  </div>
</div>

<script>
function openModal(name) {
  document.getElementById('modal-title').innerText = name;
  document.getElementById('modal').classList.add('active');
}
function closeModal() {
  document.getElementById('modal').classList.remove('active');
}

const observer = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if (entry.isIntersecting) entry.target.classList.add('visible');
  });
}, { threshold: 0.1 });

document.querySelectorAll('.fade-in').forEach(s => observer.observe(s));
</script>

</body>
</html>
